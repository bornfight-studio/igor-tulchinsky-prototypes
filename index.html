<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Hypeboard — Infinite Canvas Prototype</title>
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --muted: #777;
    --grid-scale: 1;
    --tile-w: calc(280px * var(--grid-scale));
    --tile-h: calc(200px * var(--grid-scale));
    --gap: calc(14px * var(--grid-scale));
    /* block grid */
    --cols: 6;
    --rows: 5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font-family: "Inter", system-ui, -apple-system, sans-serif; overflow: hidden;
    user-select: none; -webkit-user-select: none; touch-action: none; }

  .viewport {
    position: fixed; inset: 0; overflow: hidden; cursor: grab;
    background: transparent;
    z-index: 1;
  }
  .viewport.dragging { cursor: grabbing; }

  .bg-pattern {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-pattern[hidden] {
    display: none !important;
  }
  .bg-pattern__symbol {
    position: absolute;
    opacity: 0.15;
    color: #fff;
    line-height: 1;
    transform-origin: center center;
    will-change: transform;
  }
  .bg-pattern__symbol--shape {
    display: block;
    border: 1.5px solid currentColor;
    background: transparent;
  }
  .bg-pattern__symbol--square {
    width: 0.5em;
    height: 0.5em;
  }
  .bg-pattern__symbol--circle {
    width: 0.5em;
    height: 0.5em;
    border-radius: 50%;
  }

  /* world: positioned to start one block back+up so the 3x3 always covers the viewport */
  .world {
    position: absolute; top: 0; left: 0;
    will-change: transform;
  }
  .block {
    position: absolute;
    display: grid;
    grid-template-columns: repeat(var(--cols), var(--tile-w));
    grid-auto-rows: var(--tile-h);
    grid-auto-flow: dense;
    gap: var(--gap);
    padding: calc(var(--gap) / 2);
  }
  .tile {
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: calc(18px * var(--grid-scale));
    /* background: #000; */
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--fg);
    transition: border-color .2s ease, background .2s ease;
  }
  .tile:hover { border-color: #fff; /* background: #0a0a0a; */ }
  .block.origin .tile { border-color: rgba(255, 80, 80, 0.5); }
  .block.origin .tile:hover { border-color: rgba(255, 80, 80, 1); }
  .tile .coord {
    font-size: calc(11px * var(--grid-scale)); letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); font-variant-numeric: tabular-nums;
  }
  .tile .title {
    font-size: calc(22px * var(--grid-scale)); line-height: 1.1; font-weight: 600; letter-spacing: -0.01em;
    color: #fff;
  }
  .tile .title-hit {
    color: #fff;
  }
  .tile .meta { font-size: calc(12px * var(--grid-scale)); color: var(--muted); }

  .tile.big .title { font-size: calc(36px * var(--grid-scale)); }
  .tile.cta .title { font-size: calc(28px * var(--grid-scale)); }
  .tile.cta::after {
    content: "↗"; position: absolute; right: calc(18px * var(--grid-scale)); top: calc(18px * var(--grid-scale)); font-size: calc(20px * var(--grid-scale)); color: #fff;
  }

  /* HUD */
  .hud {
    position: fixed; left: 16px; top: 16px; z-index: 10;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); pointer-events: none;
  }
  .hud b { color: var(--fg); font-weight: 600; font-variant-numeric: tabular-nums; }
  .hint {
    position: fixed; right: 16px; bottom: 16px; z-index: 10;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); pointer-events: none;
  }

  /* drag proxy (offscreen) */
  .proxy { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }

  /* --- mobile: disable canvas, stack tiles --- */
  @media (max-width: 799px) {
    html, body { overflow-y: auto; overflow-x: hidden; height: auto; touch-action: auto; }
    .viewport { position: static; overflow: visible; cursor: default; height: auto; }
    .world { position: static; transform: none !important; will-change: auto; }
    .world > .block:not(.origin) { display: none; }
    .block {
      position: static;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: auto;
      width: 100%;
    }
    .block .tile { grid-column: span 1 !important; grid-row: span 1 !important; min-height: 160px; }
    .block .tile[data-w] { grid-column: span 2 !important; }
    .viewport.dragging { cursor: default; }
    .hud, .hint, .proxy { display: none; }
    .bg-pattern { display: none; }
  }
</style>
</head>
<body>

<div class="hud">Hypeboard · <b id="hud-x">0</b>, <b id="hud-y">0</b></div>
<div class="hint">Drag · Scroll · Trackpad · Arrows · <b id="hint-pattern">B</b> Pattern</div>

<div class="bg-pattern" id="bg-pattern" aria-hidden="true"></div>

<div class="viewport" id="viewport">
  <div class="world" id="world"></div>
</div>

<div class="proxy" id="proxy"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/Draggable.min.js"></script>
<script>
  gsap.registerPlugin(Draggable);

  // Toggle: SETTINGS.bgPattern, setBgPatternEnabled(), key B, or ?bgPattern=0|1
  const SETTINGS = {
    bgPattern: false,
  };

  const BG_PATTERN_STORAGE_KEY = 'hypeboard:bgPattern';

  // --- content for the repeating block ---
  // w / h = grid column/row span (default 1). Spans sum should fill cleanly.
  // highlight: number = first N words, "last" = last word, "last2" = last two words
  const CONTENT = [
    { cls: "v-grad-1 big",  title: "Shoot for the moon",     meta: "Say hello",          w: 2, h: 2, highlight: "last" },
    { cls: "v-grad-5",      title: "Hypeboard",          meta: "Charlotte — NC" },
    { cls: "v-grad-2",      title: "Brand systems",      meta: "002 / Studio",       w: 2, highlight: "last" },
    { cls: "v-grad-6",      title: "Made by BFS",   meta: "Portfolio" },
    { cls: "v-grad-3",      title: "Drag me anywhere",   meta: "It loops.",          h: 2, highlight: 0 },
    { cls: "v-grad-8",      title: "Hit it!",            meta: "Let's work →",       highlight: 0 },

    { cls: "v-grad-4 cta",  title: "New work",           meta: "2026",               w: 2, highlight: 0 },
    { cls: "v-grad-5",      title: "Tile #08",           meta: "Repeats forever" },
    { cls: "v-grad-7",      title: "Pink dream",         meta: "Studio play",        w: 2, h: 2, highlight: 0 },
    { cls: "v-grad-2",      title: "Type / Motion",      meta: "Reel",               highlight: "last" },
    { cls: "v-grad-6",      title: "On the menu",        meta: "Identity · Web · Motion" },
    { cls: "v-grad-1",      title: "Loud & proud",       meta: "Damn good",          w: 2, highlight: "last" },

    { cls: "v-grad-3 cta",  title: "Case study",         meta: "Read →",             highlight: 1 },
    { cls: "v-grad-5",      title: "@madebyanalogue",    meta: "Instagram",          h: 2 },
    { cls: "v-grad-8 big",  title: "Infinite",           meta: "Canvas demo",        w: 3, highlight: 1 },
    { cls: "v-grad-4",      title: "Tile #16",           meta: "Modulo wrap" },
    { cls: "v-grad-6",      title: "Hello, future",      meta: "Pitch",              highlight: "last2" },
    { cls: "v-grad-7",      title: "Vibes only",         meta: "Mood",               w: 2, highlight: 1 },

    { cls: "v-grad-2 cta",  title: "Get in touch",       meta: "hi@dgb",             highlight: 2 },
    { cls: "v-grad-1",      title: "Hot sauce",          meta: "Spicy work",         w: 2, h: 2, highlight: "last" },
    { cls: "v-grad-5",      title: "Tile #21",           meta: "GSAP Draggable" },
    { cls: "v-grad-3",      title: "Run it back",        meta: "Loop",               highlight: 2 },
    { cls: "v-grad-6",      title: "Day one",            meta: "Studio" },
    { cls: "v-grad-8",      title: "Night mode",         meta: "Always on",          w: 2, highlight: "last" },

    { cls: "v-grad-4",      title: "Tile #25",           meta: "Snap test" },
    { cls: "v-grad-7 big",  title: "Big idea",           meta: "Soon",               w: 2, h: 2, highlight: 1 },
    { cls: "v-grad-2",      title: "Pixel pushers",      meta: "Crew",               highlight: 0 },
    { cls: "v-grad-1 cta",  title: "Shop merch",         meta: "Coming",             highlight: 1 },
    { cls: "v-grad-5",      title: "Tile #29",           meta: "Loop edge",          h: 2 },
    { cls: "v-grad-3",      title: "End / Start",        meta: "Seamless",           w: 2, highlight: "last2" },
  ];

  const COLS = 6;
  const BASE_TILE_W = 280;
  const BASE_TILE_H = 200;
  const BASE_GAP = 14;
  const MIN_BLOCK_VW = 1.2;
  const BASE_BLOCK_W = COLS * BASE_TILE_W + (COLS - 1) * BASE_GAP + BASE_GAP;

  const world = document.getElementById('world');
  const viewport = document.getElementById('viewport');
  const proxy = document.getElementById('proxy');
  const bgPattern = document.getElementById('bg-pattern');
  const hudX = document.getElementById('hud-x');
  const hudY = document.getElementById('hud-y');
  const hintPattern = document.getElementById('hint-pattern');

  function isTypingTarget(el) {
    return el && (el.isContentEditable || ['INPUT', 'TEXTAREA', 'SELECT'].includes(el.tagName));
  }

  function loadSettings() {
    const params = new URLSearchParams(window.location.search);
    if (params.has('bgPattern')) {
      const value = params.get('bgPattern').toLowerCase();
      SETTINGS.bgPattern = !['0', 'false', 'off'].includes(value);
      localStorage.setItem(BG_PATTERN_STORAGE_KEY, SETTINGS.bgPattern ? '1' : '0');
      return;
    }

    const stored = localStorage.getItem(BG_PATTERN_STORAGE_KEY);
    if (stored !== null) SETTINGS.bgPattern = stored === '1';
  }

  function updateBgPatternHint() {
    if (!hintPattern) return;
    hintPattern.textContent = SETTINGS.bgPattern ? 'On' : 'Off';
  }

  const PATTERN_SYMBOLS = [
    { char: '+', cls: '' },
    { char: '✕', cls: '' },
    { char: '/', cls: '' },
    { char: '□', cls: 'bg-pattern__symbol--shape bg-pattern__symbol--square', shape: true },
    { char: '○', cls: 'bg-pattern__symbol--shape bg-pattern__symbol--circle', shape: true },
  ];
  const PATTERN_GAP = 80;
  const PATTERN_SIZE = 12;
  const PATTERN_INFLUENCE = 500;
  const PATTERN_MAX_ROT = 72;

  let patternItems = [];
  let patternMouse = { x: -9999, y: -9999 };
  let patternRaf = 0;
  let patternListenersBound = false;

  function shufflePatternDeck(length) {
    const deck = Array.from({ length }, (_, i) => PATTERN_SYMBOLS[i % PATTERN_SYMBOLS.length]);
    for (let i = deck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    return deck;
  }

  function buildBgPattern() {
    if (!SETTINGS.bgPattern) return;

    bgPattern.replaceChildren();
    patternItems = [];

    const cols = Math.ceil(window.innerWidth / PATTERN_GAP) + 1;
    const rows = Math.ceil(window.innerHeight / PATTERN_GAP) + 1;
    const deck = shufflePatternDeck(cols * rows);
    let deckIndex = 0;

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const spec = deck[deckIndex++];
        const el = document.createElement('span');
        el.className = `bg-pattern__symbol ${spec.cls}`.trim();
        if (!spec.shape) el.textContent = spec.char;

        const x = col * PATTERN_GAP + PATTERN_GAP / 2;
        const y = row * PATTERN_GAP + PATTERN_GAP / 2;

        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        el.style.fontSize = `${PATTERN_SIZE}px`;

        const item = {
          el,
          baseRot: (Math.random() - 0.5) * 36,
          setRot: gsap.quickTo(el, 'rotation', { duration: 0.75, ease: 'power2.out' }),
        };

        gsap.set(el, { xPercent: -50, yPercent: -50 });
        item.setRot(item.baseRot);
        patternItems.push(item);
        bgPattern.appendChild(el);
      }
    }
  }

  function updateBgPattern() {
    if (!SETTINGS.bgPattern) return;
    patternRaf = 0;
    patternItems.forEach((item) => {
      const rect = item.el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dist = Math.hypot(patternMouse.x - cx, patternMouse.y - cy);
      const t = Math.max(0, 1 - dist / PATTERN_INFLUENCE);
      const angle = Math.atan2(patternMouse.y - cy, patternMouse.x - cx) * (180 / Math.PI);
      const rot = item.baseRot + t * PATTERN_MAX_ROT * (angle / 180);

      item.setRot(rot);
    });
  }

  function queueBgPatternUpdate() {
    if (patternRaf) return;
    patternRaf = requestAnimationFrame(updateBgPattern);
  }

  function onPatternPointerMove(e) {
    if (!SETTINGS.bgPattern) return;
    patternMouse.x = e.clientX;
    patternMouse.y = e.clientY;
    queueBgPatternUpdate();
  }

  function onPatternPointerLeave() {
    patternMouse.x = -9999;
    patternMouse.y = -9999;
    patternItems.forEach((item) => item.setRot(item.baseRot));
  }

  function onPatternResize() {
    if (!SETTINGS.bgPattern) return;
    buildBgPattern();
    queueBgPatternUpdate();
  }

  function bindBgPatternListeners() {
    if (patternListenersBound) return;
    window.addEventListener('pointermove', onPatternPointerMove);
    window.addEventListener('pointerleave', onPatternPointerLeave);
    window.addEventListener('resize', onPatternResize);
    patternListenersBound = true;
  }

  function unbindBgPatternListeners() {
    if (!patternListenersBound) return;
    window.removeEventListener('pointermove', onPatternPointerMove);
    window.removeEventListener('pointerleave', onPatternPointerLeave);
    window.removeEventListener('resize', onPatternResize);
    patternListenersBound = false;
  }

  function setBgPatternEnabled(enabled) {
    SETTINGS.bgPattern = !!enabled;
    localStorage.setItem(BG_PATTERN_STORAGE_KEY, SETTINGS.bgPattern ? '1' : '0');
    applyBgPatternSetting();
  }

  function applyBgPatternSetting() {
    cancelAnimationFrame(patternRaf);
    patternRaf = 0;
    patternMouse.x = -9999;
    patternMouse.y = -9999;
    updateBgPatternHint();

    if (SETTINGS.bgPattern) {
      bgPattern.hidden = false;
      buildBgPattern();
      bindBgPatternListeners();
      return;
    }

    unbindBgPatternListeners();
    patternItems = [];
    bgPattern.replaceChildren();
    bgPattern.hidden = true;
  }

  function onSettingsKeyDown(e) {
    if (e.key !== 'b' && e.key !== 'B') return;
    if (isTypingTarget(document.activeElement)) return;
    e.preventDefault();
    setBgPatternEnabled(!SETTINGS.bgPattern);
  }

  loadSettings();
  applyBgPatternSetting();
  window.addEventListener('keydown', onSettingsKeyDown);

  window.Hypeboard = {
    settings: SETTINGS,
    setBgPatternEnabled,
  };

  const HIT_COLOR = '#ff5050';
  const TITLE_COLOR = '#ffffff';

  let titleHitObserver = null;

  function formatTitle(title, highlight) {
    if (!highlight) return title;

    const words = title.trim().split(/\s+/);
    if (words.length < 2) return title;

    let start = 0;
    let end = 0;

    if (highlight === 'last') {
      start = words.length - 1;
      end = words.length;
    } else if (highlight === 'last2') {
      start = Math.max(0, words.length - 2);
      end = words.length;
    } else if (typeof highlight === 'number') {
      start = 0;
      end = Math.min(highlight, words.length);
    } else {
      return title;
    }

    if (end - start < 1) return title;

    const parts = [];
    if (start > 0) parts.push(words.slice(0, start).join(' '));
    parts.push(`<span class="title-hit">${words.slice(start, end).join(' ')}</span>`);
    if (end < words.length) parts.push(words.slice(end).join(' '));
    return parts.join(' ');
  }

  function disconnectTitleHits() {
    if (titleHitObserver) {
      titleHitObserver.disconnect();
      titleHitObserver = null;
    }
    world.querySelectorAll('.title-hit').forEach((span) => {
      gsap.killTweensOf(span);
      gsap.set(span, { color: TITLE_COLOR });
    });
  }

  function connectTitleHits() {
    disconnectTitleHits();

    const spans = world.querySelectorAll('.title-hit');
    if (!spans.length) return;

    titleHitObserver = new IntersectionObserver((entries) => {
      entries.forEach(({ target, isIntersecting }) => {
        gsap.to(target, {
          color: isIntersecting ? HIT_COLOR : TITLE_COLOR,
          duration: 0.45,
          delay: 0.6,
          ease: 'power2.out',
          overwrite: 'auto',
        });
      });
    }, { threshold: 0.55 });

    spans.forEach((span) => titleHitObserver.observe(span));
  }

  function buildBlock() {
    const block = document.createElement('div');
    block.className = 'block';
    CONTENT.forEach((data, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile ' + data.cls;
      if (data.w) { tile.style.gridColumn = `span ${data.w}`; tile.dataset.w = data.w; }
      if (data.h) tile.style.gridRow = `span ${data.h}`;
      tile.innerHTML = `
        <div class="coord">#${String(i + 1).padStart(2, '0')}</div>
        <div class="title">${formatTitle(data.title, data.highlight)}</div>
        <div class="meta">${data.meta}</div>`;
      block.appendChild(tile);
    });
    return block;
  }

  function wrap(v, mod) {
    return ((v % mod) + mod) % mod;
  }

  function getGridScale() {
    return Math.max(1, (window.innerWidth * MIN_BLOCK_VW) / BASE_BLOCK_W);
  }

  function applyGridScale(scale) {
    document.documentElement.style.setProperty('--grid-scale', String(scale));
  }

  function getBlockWidth(scale = getGridScale()) {
    return BASE_BLOCK_W * scale;
  }

  function measureBlockHeight() {
    const probe = buildBlock();
    probe.style.cssText = 'visibility:hidden;position:absolute;left:0;top:0;';
    world.appendChild(probe);
    const h = Math.round(probe.getBoundingClientRect().height);
    probe.remove();
    return h;
  }

  const mm = gsap.matchMedia();

  mm.add("(max-width: 799px)", () => {
    world.replaceChildren();
    const b = buildBlock();
    b.classList.add('origin');
    world.appendChild(b);
    connectTitleHits();

    return () => {
      disconnectTitleHits();
      world.replaceChildren();
      gsap.set(world, { clearProps: 'transform' });
      document.documentElement.style.removeProperty('--grid-scale');
    };
  });

  mm.add("(min-width: 800px)", () => {
    let BLOCK_W = 0;
    let BLOCK_H = 0;
    let gridHalfX = 0;
    let gridHalfY = 0;
    let building = false;
    let resizeRaf = 0;
    let cancelled = false;
    const state = { x: 0, y: 0 };
    const vel = { x: 0, y: 0 };
    let lastMoveT = performance.now();
    let glideTween = null;
    let lastX = 0;
    let lastY = 0;
    let draggable = null;
    let gridScale = 1;
    let setupAttempts = 0;
    const KEY_PAN_SPEED = 14;
    const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };
    let keyPanRaf = 0;

    function render() {
      if (BLOCK_W < 1 || BLOCK_H < 1) return;
      const tx = wrap(state.x, BLOCK_W) - BLOCK_W;
      const ty = wrap(state.y, BLOCK_H) - BLOCK_H;
      world.style.transform = `translate3d(${tx}px, ${ty}px, 0)`;
      hudX.textContent = Math.round(-state.x);
      hudY.textContent = Math.round(-state.y);
    }

    function buildDesktopWorld() {
      if (building || cancelled) return;

      gridScale = getGridScale();
      applyGridScale(gridScale);

      const w = getBlockWidth(gridScale);
      const h = measureBlockHeight();
      if (w < 1 || h < 1) return;

      const bxHalf = Math.ceil(window.innerWidth / w) + 1;
      const byHalf = Math.ceil(window.innerHeight / h) + 1;

      building = true;
      BLOCK_W = w;
      BLOCK_H = h;
      gridHalfX = bxHalf;
      gridHalfY = byHalf;
      world.replaceChildren();

      for (let by = -byHalf; by <= byHalf; by++) {
        for (let bx = -bxHalf; bx <= bxHalf; bx++) {
          const b = buildBlock();
          if (bx === 0 && by === 0) b.classList.add('origin');
          b.style.transform = `translate(${bx * BLOCK_W}px, ${by * BLOCK_H}px)`;
          world.appendChild(b);
        }
      }

      building = false;
      render();
      connectTitleHits();
    }

    function setupDesktop() {
      if (cancelled) return;

      buildDesktopWorld();
      if (cancelled || BLOCK_W < 1 || BLOCK_H < 1) {
        if (setupAttempts++ < 10) requestAnimationFrame(setupDesktop);
        return;
      }

      if (draggable) return;

      gsap.set(proxy, { x: 0, y: 0 });

      [draggable] = Draggable.create(proxy, {
        type: "x,y",
        trigger: viewport,
        allowNativeTouchScrolling: false,
        onPress() {
          viewport.classList.add('dragging');
          lastX = this.x;
          lastY = this.y;
          vel.x = 0;
          vel.y = 0;
          lastMoveT = performance.now();
          if (glideTween) { glideTween.kill(); glideTween = null; }
        },
        onDrag() {
          const dx = this.x - lastX;
          const dy = this.y - lastY;
          const now = performance.now();
          const dt = Math.max(1, now - lastMoveT);
          vel.x = vel.x * 0.6 + (dx / dt) * 0.4;
          vel.y = vel.y * 0.6 + (dy / dt) * 0.4;
          lastMoveT = now;
          state.x += dx;
          state.y += dy;
          lastX = this.x;
          lastY = this.y;
          render();
        },
        onRelease() {
          viewport.classList.remove('dragging');
          const factor = 220;
          const targetX = state.x + vel.x * factor;
          const targetY = state.y + vel.y * factor;
          glideTween = gsap.to(state, {
            x: targetX,
            y: targetY,
            duration: 1.4,
            ease: "power3.out",
            onUpdate: render,
          });
        },
      });
    }

    function onWheel(e) {
      e.preventDefault();
      if (glideTween) { glideTween.kill(); glideTween = null; }
      if (e.shiftKey && e.deltaX === 0) {
        state.x += e.deltaY;
      } else {
        state.x += e.deltaX;
        state.y += e.deltaY;
      }
      render();
    }

    function keyPanStep() {
      if (keys.ArrowLeft) state.x += KEY_PAN_SPEED;
      if (keys.ArrowRight) state.x -= KEY_PAN_SPEED;
      if (keys.ArrowUp) state.y -= KEY_PAN_SPEED;
      if (keys.ArrowDown) state.y += KEY_PAN_SPEED;
      render();
      keyPanRaf = requestAnimationFrame(keyPanStep);
    }

    function startKeyPan() {
      if (keyPanRaf) return;
      keyPanRaf = requestAnimationFrame(keyPanStep);
    }

    function stopKeyPan() {
      cancelAnimationFrame(keyPanRaf);
      keyPanRaf = 0;
    }

    function onKeyDown(e) {
      if (!(e.key in keys) || isTypingTarget(document.activeElement)) return;
      e.preventDefault();
      if (glideTween) { glideTween.kill(); glideTween = null; }
      if (!keys[e.key]) {
        keys[e.key] = true;
        startKeyPan();
      }
    }

    function onKeyUp(e) {
      if (!(e.key in keys)) return;
      keys[e.key] = false;
      if (!Object.values(keys).some(Boolean)) stopKeyPan();
    }

    function onWindowBlur() {
      Object.keys(keys).forEach((key) => { keys[key] = false; });
      stopKeyPan();
    }

    function onResize() {
      cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(() => {
        if (cancelled || BLOCK_W < 1 || BLOCK_H < 1) return;

        const nextScale = getGridScale();
        const bxHalf = Math.ceil(window.innerWidth / (BASE_BLOCK_W * nextScale)) + 1;
        const byHalf = Math.ceil(window.innerHeight / BLOCK_H) + 1;

        if (bxHalf !== gridHalfX || byHalf !== gridHalfY || nextScale !== gridScale) {
          buildDesktopWorld();
        } else {
          render();
        }
      });
    }

    requestAnimationFrame(setupDesktop);
    viewport.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    window.addEventListener('blur', onWindowBlur);
    window.addEventListener('resize', onResize);

    return () => {
      cancelled = true;
      cancelAnimationFrame(resizeRaf);
      stopKeyPan();
      disconnectTitleHits();
      if (glideTween) glideTween.kill();
      if (draggable) draggable.kill();
      viewport.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKeyDown);
      window.removeEventListener('keyup', onKeyUp);
      window.removeEventListener('blur', onWindowBlur);
      window.removeEventListener('resize', onResize);
      viewport.classList.remove('dragging');
      world.replaceChildren();
      gsap.set(world, { clearProps: 'transform' });
      gsap.set(proxy, { x: 0, y: 0 });
      document.documentElement.style.removeProperty('--grid-scale');
    };
  });
</script>
</body>
</html>
